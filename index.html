<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&D Campaign Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
  (function() {
    var mode = localStorage.getItem('dnd-color-mode') || 'system';
    var theme = localStorage.getItem('dnd-theme');
    if (mode === 'system') {
      mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }
    if (mode === 'dark') document.documentElement.classList.add('dark');
    if (theme && theme !== 'default') document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
