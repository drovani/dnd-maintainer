<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>D&D Campaign Manager</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
  (function() {
    try {
      var validThemes = ['sylvan', 'arcane'];
      var validModes = ['light', 'dark', 'system'];
      var mode = localStorage.getItem('dnd-color-mode');
      var theme = localStorage.getItem('dnd-theme');
      if (!mode || validModes.indexOf(mode) === -1) mode = 'system';
      if (mode === 'system') {
        mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      if (mode === 'dark') document.documentElement.classList.add('dark');
      if (theme && validThemes.indexOf(theme) !== -1) {
        document.documentElement.setAttribute('data-theme', theme);
      }
    } catch (e) {
      console.warn('[theme] Inline bootstrap failed:', e);
      // ThemeProvider will apply theme once React mounts
    }
  })();
</script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
